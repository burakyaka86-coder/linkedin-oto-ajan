name: LinkedIn Otonom Ajan

on:
  schedule:
    # Her gün Türkiye saatiyle 10:00'da çalışır (UTC 07:00)
    - cron: '0 7 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  paylasim_yap:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Ajanı Çalıştır
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ajan.py
